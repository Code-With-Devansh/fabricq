services:
  postgres:
    image: postgres:17
    container_name: fabricq-postgres
    restart: unless-stopped
    networks:
      - internal
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fabricq

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: fabricq-redis
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fabricq-api

    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis

    ports:
      - "3000:3000"
    networks:
      - internal
    environment:
      PORT: 3000

      DATABASE_URL: postgres://postgres:postgres@postgres:5432/fabricq
      REDIS_URL: redis://redis:6379

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fabricq-scheduler
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis
    networks:
      - internal
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/fabricq
      REDIS_URL: redis://redis:6379
    command: node src/scheduler_process.js

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis
    networks:
      - internal
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/fabricq
      REDIS_URL: redis://redis:6379
    command: node src/worker_process.js
    # No container_name - scale with: docker compose up -d --scale worker=3
    # (deploy.replicas is a Swarm-only field and is ignored by plain `docker compose up`)

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge