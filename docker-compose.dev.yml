services:
  postgres:
    image: postgres:17
    container_name: fabricq-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    networks:
      - internal
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fabricq

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: fabricq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - internal
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: dockerfile.dev
    container_name: fabricq-api

    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/usr/src/app
      - node_modules:/usr/src/app/node_modules
    ports:
      - "3000:3000"
    networks:
      - internal
    environment:
      PORT: 3000

      DATABASE_URL: postgres://postgres:postgres@postgres:5432/fabricq
      REDIS_URL: redis://redis:6379
    command: sh -c "npm install && npx nodemon --legacy-watch src/server.js"

volumes:
  postgres_data:
  redis_data:
  node_modules:

networks:
  internal:
    driver: bridge